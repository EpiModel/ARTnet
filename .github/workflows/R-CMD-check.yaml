# R CMD check on ubuntu-latest / R release. Based on the standard
# r-lib/actions template; see https://github.com/r-lib/actions/tree/v2/examples
#
# Single-OS matrix because ARTnet is not CRAN-published — we don't need
# to test against multi-platform portability the way a CRAN package would.
#
# ARTnetData is a private package and is NOT installed in CI — the
# package's exported functions guard on its presence and error with a
# clear message, and the testthat suite skips gracefully when it's
# missing. That keeps CI fast and avoids having to provision a PAT
# with access to EpiModel/ARTnetData.
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
